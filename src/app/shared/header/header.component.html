<nav>
  <div class="flex">
    <button
      class="logo-btn"
      type="button"
      [attr.aria-label]="'a11y.backToHome' | translate"
      (click)="backToHome('home')"
    >
      <img
        [src]="
          theme === 'dark'
            ? './assets/img/logo/logo3.png'
            : './assets/img/logo/logo2.png'
        "
        alt=""
        width="611"
        height="306"
      />
    </button>
    <div class="menu-ri">
      <button
        type="button"
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="
          (theme === 'dark' ? 'a11y.themeLight' : 'a11y.themeDark') | translate
        "
      >
        @if (theme === 'dark') {
        <svg
          aria-hidden="true"
          focusable="false"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        } @else {
        <svg
          aria-hidden="true"
          focusable="false"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        }
      </button>
      <div class="lang">
        <input
          id="menu"
          type="checkbox"
          [checked]="isLenMenuOpen"
          (change)="toggleLenMenu()"
          aria-label="Sprache wählen / Select language"
        />
        <label for="menu" aria-hidden="true"><div></div></label>
        <ul class="menu">
          <li>
            <button type="button" (click)="switchLanguage('en'); closeLenMenu()">
              <span>{{ "header.english" | translate }}</span>
              <i class="fas fa-address-card" aria-hidden="true"></i>
            </button>
          </li>
          <li>
            <button type="button" (click)="switchLanguage('ger'); closeLenMenu()">
              <span>{{ "header.german" | translate }}</span>
              <i class="fas fa-tasks" aria-hidden="true"></i>
            </button>
          </li>
        </ul>
      </div>
      <button
        #burgerBtn
        type="button"
        (click)="toggleMenu(); closeLenMenu()"
        class="burger-menu"
        [attr.aria-expanded]="menuOpen === true"
        [attr.aria-label]="
          (menuOpen ? 'a11y.closeMenu' : 'a11y.openMenu') | translate
        "
        [ngClass]="{
          openMenuAnimation: menuOpen === true,
          closeMenuAnimation: menuOpen === false
        }"
      ></button>
    </div>
  </div>
</nav>

<app-menu [menuOpen]="menuOpen" (menuToggle)="toggleMenu()"></app-menu>
